kind = "web"
previewPath = "/"
title = "Franklin TN Guide"
version = "1.0.0"
id = "artifacts/franklin-tn-guide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23933

[services.development]
run = "pnpm --filter @workspace/franklin-tn-guide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/franklin-tn-guide", "run", "build" ]
publicDir = "artifacts/franklin-tn-guide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23933"
BASE_PATH = "/"
